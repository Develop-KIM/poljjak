<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(217,91%,52%)" />
      <stop offset="100%" style="stop-color:hsl(230,82%,42%)" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 장식 원 -->
  <circle cx="1100" cy="80" r="260" fill="white" fill-opacity="0.04" />
  <circle cx="1020" cy="580" r="180" fill="white" fill-opacity="0.04" />
  <circle cx="100" cy="560" r="140" fill="white" fill-opacity="0.04" />

  <!-- 뱃지 -->
  <rect x="80" y="76" width="228" height="38" rx="19" fill="white" fill-opacity="0.18" />
  <text x="194" y="101" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">AI 포트폴리오 분석 서비스</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="230" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, sans-serif" font-size="100" font-weight="900" fill="white" letter-spacing="-2">폴짝</text>

  <!-- 슬로건 -->
  <text x="80" y="302" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" font-weight="500" fill="white" fill-opacity="0.92">PDF 하나로 포트폴리오의 약점을 정확히 파악하세요.</text>
  <text x="80" y="346" font-family="Apple SD Gothic Neo, Noto Sans KR, Malgun Gothic, sans-serif" font-size="24" fill="white" fill-opacity="0.70">AI가 10가지 항목을 점수·코멘트로 분석하고 Before/After 개선안을 제시해드려요.</text>

  <!-- 구분선 -->
  <line x1="80" y1="400" x2="480" y2="400" stroke="white" stroke-opacity="0.2" stroke-width="1" />

  <!-- 스탯 3개 -->
  <rect x="80" y="422" width="160" height="72" rx="14" fill="white" fill-opacity="0.12" />
  <text x="160" y="460" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">10종</text>
  <text x="160" y="481" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="13" fill="white" fill-opacity="0.72" text-anchor="middle">핵심 분석 항목</text>

  <rect x="256" y="422" width="160" height="72" rx="14" fill="white" fill-opacity="0.12" />
  <text x="336" y="460" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">1분</text>
  <text x="336" y="481" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="13" fill="white" fill-opacity="0.72" text-anchor="middle">이내 분석 완료</text>

  <rect x="432" y="422" width="160" height="72" rx="14" fill="white" fill-opacity="0.12" />
  <text x="512" y="460" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">무료</text>
  <text x="512" y="481" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="13" fill="white" fill-opacity="0.72" text-anchor="middle">로그인 후 시작</text>

  <!-- URL -->
  <text x="80" y="590" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="20" fill="white" fill-opacity="0.50" letter-spacing="1">poljjak.kr</text>
</svg>
